# WARNING: This file is autogenerated - changes will be overwritten when regenerated by https://github.com/pulumi/ci-mgmt

name: "Test Provider"

on:
   workflow_call:
     inputs:
       version:
         required: true
         type: string
         description: Version of the provider to test

env:
  PR_COMMIT_SHA: ${{ github.event.client_payload.pull_request.head.sha }}
  MISE_ENV: test

  ARM_ENVIRONMENT: public
  ARM_LOCATION: westus2
  PULUMI_API: https://api.pulumi-staging.io
  PULUMI_GO_DEP_ROOT: ${{ github.workspace }}/..
  PULUMI_LOCAL_NUGET: ${{ github.workspace }}/nuget
  PULUMI_MISSING_DOCS_ERROR: "true"
  TF_APPEND_USER_AGENT: pulumi

jobs:
  test:
    # Integration tests are disabled on the v5 security-patch backport branch: the
    # examples acceptance tests require Azure credentials and are too old to run
    # reliably. This job is a no-op so that dependents declaring `needs: test`
    # (Sentinel, publish) stay green. Unit tests still run via prerequisites.yml
    # (`make test_provider`).
    runs-on: ubuntu-latest
    steps:
    - name: Integration tests disabled
      run: echo "Integration tests are disabled on the v5 security-patch backport branch."
